<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla Seesaw</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="shortcut icon"
      href="https://uncore.me/favicon.svg"
      type="image/x-icon"
    />
  </head>
  <body>
    <div class="container">
      <div class="app-container">
        <div class="stats">
          <div class="stat torque" id="left-weight">
            <div class="title">Left Weight</div>
            <div class="val">0kg (0 torque)</div>
          </div>
          <div class="stat" id="tilt-angle">
            <div class="title">Tilt Angle</div>
            <div class="val">0°</div>
          </div>
          <div class="stat" id="next-weight">
            <div class="title">Next Weight</div>
            <div class="val">0kg</div>
          </div>
          <div class="stat torque" id="right-weight">
            <div class="title">Right Weight</div>
            <div class="val">0kg (0 torque)</div>
          </div>
        </div>
        <div id="seesaw-container">
          <div id="seesaw">
            <div id="ruler"></div>
            <div id="preview-weight"></div>
          </div>
          <div class="pivot"></div>
        </div>
        <div class="options">
          <input type="checkbox" name="sfx" id="sfx-toggle" checked />
          <label for="sfx-toggle">Sound Effects</label>
          <button id="reset-btn">Reset</button>
        </div>
        <div id="logs"></div>
      </div>
    </div>

    <audio id="sfx" src="beep.mp3"></audio>
    <script src="main.js"></script>
  </body>
</html>
