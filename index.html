<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="app-container">
        <div class="stats">
          <div class="stat torque" id="left-weight">
            <div class="title">Left Weight</div>
            <div class="val">0kg (0 torque)</div>
          </div>
          <div class="stat" id="tilt-angle">
            <div class="title">Tilt Angle</div>
            <div class="val">0°</div>
          </div>
          <div class="stat" id="next-weight">
            <div class="title">Next Weight</div>
            <div class="val">0kg</div>
          </div>
          <div class="stat torque" id="right-weight">
            <div class="title">Right Weight</div>
            <div class="val">0kg (0 torque)</div>
          </div>
        </div>
        <div id="seesaw-container">
          <div id="seesaw">
            <div id="ruler"></div>
            <div id="preview-weight"></div>
          </div>
          <div class="pivot"></div>
        </div>
        <button id="reset-btn">Reset</button>
        <div id="logs"></div>
      </div>
    </div>

    <script src="./main.js"></script>
  </body>
</html>
